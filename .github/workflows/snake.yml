name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate snake SVGs
        run: python scripts/generate_snake.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898270+github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake-dark.svg assets/github-snake.svg
          git diff --cached --quiet || (git commit -m "chore: refresh contribution snake" && git push)
