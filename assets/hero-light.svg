<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="280" viewBox="0 0 1000 280" font-family="'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="60" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0969da"/>
      <stop offset="1" stop-color="#8250df"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="t1">
      <rect x="84" y="186" width="0" height="32">
        <animate attributeName="width" values="0;148;148;0;0" keyTimes="0;0.09;0.22;0.235;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="t2">
      <rect x="84" y="186" width="0" height="32">
        <animate attributeName="width" values="0;0;248;248;0;0" keyTimes="0;0.25;0.34;0.47;0.485;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="t3">
      <rect x="84" y="186" width="0" height="32">
        <animate attributeName="width" values="0;0;313;313;0;0" keyTimes="0;0.5;0.59;0.72;0.735;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="t4">
      <rect x="84" y="186" width="0" height="32">
        <animate attributeName="width" values="0;0;326;326;0;0" keyTimes="0;0.75;0.84;0.97;0.985;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1000" height="280" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="999" height="279" rx="13.5" fill="none" stroke="#d0d7de"/>

  <!-- ambient tint behind the network -->
  <circle cx="790" cy="120" r="150" fill="#0969da" opacity="0.05"/>
  <circle cx="900" cy="200" r="110" fill="#8250df" opacity="0.05"/>

  <!-- neural network: edges -->
  <g stroke="#c3d0e0" stroke-width="1">
    <line x1="650" y1="56" x2="790" y2="44"/>
    <line x1="650" y1="56" x2="790" y2="96"/>
    <line x1="650" y1="116" x2="790" y2="96"/>
    <line x1="650" y1="116" x2="790" y2="148"/>
    <line x1="650" y1="176" x2="790" y2="148"/>
    <line x1="650" y1="176" x2="790" y2="200"/>
    <line x1="650" y1="236" x2="790" y2="200"/>
    <line x1="650" y1="236" x2="790" y2="252"/>
    <line x1="790" y1="44" x2="920" y2="90"/>
    <line x1="790" y1="96" x2="920" y2="90"/>
    <line x1="790" y1="96" x2="920" y2="160"/>
    <line x1="790" y1="148" x2="920" y2="160"/>
    <line x1="790" y1="200" x2="920" y2="160"/>
    <line x1="790" y1="200" x2="920" y2="230"/>
    <line x1="790" y1="252" x2="920" y2="230"/>
  </g>

  <!-- neural network: nodes with staggered pulse -->
  <g fill="#0969da">
    <circle cx="650" cy="56" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="116" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3s" begin="-0.7s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="176" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3s" begin="-1.4s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="236" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3s" begin="-2.1s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#8250df">
    <circle cx="790" cy="44" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.4s" begin="-0.3s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="96" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.4s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="148" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.4s" begin="-1.7s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="200" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.4s" begin="-2.4s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="252" r="5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.4s" begin="-3.1s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#0969da">
    <circle cx="920" cy="90" r="5.5"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="2.8s" begin="-0.5s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="160" r="5.5"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="2.8s" begin="-1.5s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="230" r="5.5"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="2.8s" begin="-2.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- signals travelling through the network -->
  <g filter="url(#glow)">
    <circle r="2.6" fill="#8250df">
      <animateMotion path="M650,56 L790,44 L920,90" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.6" fill="#0969da">
      <animateMotion path="M650,116 L790,148 L920,160" dur="4.6s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.6" fill="#8250df">
      <animateMotion path="M650,176 L790,200 L920,230" dur="5.2s" begin="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.6" fill="#0969da">
      <animateMotion path="M650,236 L790,252 L920,230" dur="4.3s" begin="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- intro text -->
  <text x="62" y="92" font-size="14" font-weight="600" letter-spacing="4" fill="#57606a">HELLO, I'M</text>
  <text x="60" y="146" font-size="46" font-weight="700" fill="url(#accent)">Ajay Jeevan Jose</text>

  <!-- typewriter line -->
  <text x="60" y="210" font-family="Consolas, 'Courier New', monospace" font-size="21" font-weight="700" fill="#0969da">&#10095;</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="21" fill="#24292f">
    <g clip-path="url(#t1)"><text x="88" y="210">AI Engineer</text></g>
    <g clip-path="url(#t2)"><text x="88" y="210">GenAI &amp; LLM Systems</text></g>
    <g clip-path="url(#t3)"><text x="88" y="210">Python Backend Developer</text></g>
    <g clip-path="url(#t4)"><text x="88" y="210">Azure ML &amp; Data Pipelines</text></g>
  </g>
  <rect y="190" width="10" height="24" fill="#0969da">
    <animate attributeName="x" values="88;236;236;88;88;336;336;88;88;401;401;88;88;414;414;88;88" keyTimes="0;0.09;0.22;0.235;0.25;0.34;0.47;0.485;0.5;0.59;0.72;0.735;0.75;0.84;0.97;0.985;1" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" keyTimes="0;0.5" calcMode="discrete" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="62" y="252" font-size="15" fill="#57606a">Building intelligent systems &#183; GenAI &#183; Azure &#183; Python</text>
</svg>
