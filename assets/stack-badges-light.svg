<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="60" viewBox="0 0 1040 60" font-family="'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <g id="glyph-spark" stroke="#0969da" stroke-width="2.2" stroke-linecap="round">
      <line x1="10" y1="2" x2="10" y2="18"/>
      <line x1="3" y1="6" x2="17" y2="14"/>
      <line x1="3" y1="14" x2="17" y2="6"/>
    </g>
    <g id="glyph-anthropic" stroke="#0969da" stroke-width="2.2" stroke-linecap="round" fill="none">
      <path d="M3.5,17 L10,3 L16.5,17"/>
      <line x1="6.8" y1="11.5" x2="13.2" y2="11.5"/>
    </g>
    <g id="glyph-chain" stroke="#0969da" stroke-width="2" fill="none">
      <circle cx="6.5" cy="10" r="4.5"/>
      <circle cx="13.5" cy="10" r="4.5"/>
    </g>
    <g id="glyph-crew">
      <g stroke="#0969da" stroke-width="1.5">
        <line x1="10" y1="4" x2="4" y2="15"/>
        <line x1="10" y1="4" x2="16" y2="15"/>
        <line x1="4" y1="15" x2="16" y2="15"/>
      </g>
      <g fill="#0969da">
        <circle cx="10" cy="4" r="2.6"/>
        <circle cx="4" cy="15" r="2.6"/>
        <circle cx="16" cy="15" r="2.6"/>
      </g>
    </g>
    <g id="glyph-keras">
      <rect x="2" y="2" width="16" height="16" rx="3.5" fill="none" stroke="#0969da" stroke-width="2"/>
      <text x="10" y="14.5" text-anchor="middle" font-size="11" font-weight="700" fill="#0969da">K</text>
    </g>
    <g id="glyph-cloud" fill="#0969da">
      <circle cx="6" cy="11.5" r="3.4"/>
      <circle cx="10" cy="8.5" r="4.4"/>
      <circle cx="14" cy="11.5" r="3.4"/>
      <rect x="6" y="10.8" width="8" height="4.1"/>
    </g>
    <g id="glyph-api">
      <text x="10" y="14.5" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="700" fill="#0969da">&lt;/&gt;</text>
    </g>
  </defs>

  <!-- pills -->
  <g>
    <rect x="18" y="8" width="118" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(34,20)"><use href="#glyph-spark"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="0s" repeatCount="indefinite"/></use></g>
    <text x="62" y="35.5" font-size="15" font-weight="600" fill="#24292f">OpenAI</text>

    <rect x="150" y="8" width="146" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(166,20)"><use href="#glyph-anthropic"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-0.55s" repeatCount="indefinite"/></use></g>
    <text x="194" y="35.5" font-size="15" font-weight="600" fill="#24292f">Anthropic</text>

    <rect x="310" y="8" width="146" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(326,20)"><use href="#glyph-chain"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-1.1s" repeatCount="indefinite"/></use></g>
    <text x="354" y="35.5" font-size="15" font-weight="600" fill="#24292f">LangChain</text>

    <rect x="470" y="8" width="120" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(486,20)"><use href="#glyph-crew"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-1.65s" repeatCount="indefinite"/></use></g>
    <text x="514" y="35.5" font-size="15" font-weight="600" fill="#24292f">CrewAI</text>

    <rect x="604" y="8" width="110" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(620,20)"><use href="#glyph-keras"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-2.2s" repeatCount="indefinite"/></use></g>
    <text x="648" y="35.5" font-size="15" font-weight="600" fill="#24292f">Keras</text>

    <rect x="728" y="8" width="136" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(744,20)"><use href="#glyph-cloud"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-2.75s" repeatCount="indefinite"/></use></g>
    <text x="772" y="35.5" font-size="15" font-weight="600" fill="#24292f">Azure ML</text>

    <rect x="878" y="8" width="144" height="44" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <g transform="translate(894,20)"><use href="#glyph-api"><animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-3.3s" repeatCount="indefinite"/></use></g>
    <text x="922" y="35.5" font-size="15" font-weight="600" fill="#24292f">REST APIs</text>
  </g>
</svg>
